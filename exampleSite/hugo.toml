baseURL = "https://letsblaze.thomaslaurenson.com"
languageCode = "en-US"
title = "letsblaze"
theme = "letsblaze"
themesDir = "../.."

enableEmoji = true
enableGitInfo = true

disableHugoGeneratorInject = false  # intentional — we like Hugo

# Pagination: pagerSize replaces the old top-level `paginate` key (changed ~v0.128.0)
[pagination]
  pagerSize = 10

[permalinks]
  blog = "/blog/:slug/"

[markup.goldmark.renderer]
  unsafe = true             # allow raw HTML in content files (e.g. <del>, <mark>, <kbd>)

[markup.highlight]
  noClasses = true    # inline Chroma styles — required since we have no external CSS
  style = "monochrome"
  # letsblaze is opinionated: monochrome is the only supported code style.
  # To use a different Chroma style, change the value above.
  # See https://xyproto.github.io/splash/docs/ for available styles.

[params]
  author = "Thomas Laurenson"
  copyright = "Thomas Laurenson"
  description = "A blazingly fast, no-JS Hugo theme built for blogs and docs."
  dateFormat = "2006-01-02" # Go reference time format
  homepagePostCount = 5     # number of posts shown on the homepage
  showThemeCredit = true
  # ogImage = "/og-image.png"  # uncomment and add image to static/ to enable OG images

[[menus.main]]
  name = "Blog"
  url = "/blog/"
  weight = 1

[[menus.main]]
  name = "Docs"
  url = "/docs/"
  weight = 2

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 4
