{{ define "main" }}
{{ if not .Parent.IsHome }}
  {{ partial "breadcrumb.html" . }}
{{ end }}
<article>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ if .Parent.IsHome }}
    <ul>
      {{ range .Sections }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ else }}
    <ul>
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
</article>
{{ end }}
