<style>
  .skip-link { position: absolute; left: -9999px; top: 0; }
  .skip-link:focus { left: 0; z-index: 1; background: #fff; padding: 0.5rem 1rem; }

  body { max-width: 100ch; margin: 0 auto; padding: 1rem; font-size: 18px; line-height: 1.6; color: #111; }

  img { max-width: 100%; height: auto; }

  table { border-collapse: collapse; display: block; overflow-x: auto; }
  th, td { border: 1px solid; padding: 0.4rem 0.8rem; }
  [data-align="left"]   { text-align: left; }
  [data-align="center"] { text-align: center; }
  [data-align="right"]  { text-align: right; }

  pre { overflow-x: auto; }

  nav ul { list-style: none; margin: 0; padding: 0; }

  header nav ul li { display: inline; }
  header nav ul li + li::before { content: " / "; }

  nav[aria-label="Breadcrumb"] ol { list-style: none; margin: 0; padding: 0; }

  [aria-current="page"] { font-weight: bold; }

  @media (prefers-color-scheme: dark) {
    body { background-color: #111; color: #ddd; }
    a { color: #6ab0f5; }
    a:visited { color: #c9a0f5; }
    pre { background-color: #1e1e1e; }
    code { background-color: #1e1e1e; color: #ddd; }
    details, summary { color: #ddd; }
    mark { background-color: #5a4a00; color: #fff; }
    table, th, td { border-color: #444; }

  }
</style>
