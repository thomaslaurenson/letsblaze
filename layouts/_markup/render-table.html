<table>
  <thead>
    {{- range .THead }}
      <tr>
        {{- range . }}
          <th{{- with .Alignment }} data-align="{{ . }}"{{- end }}>{{- .Text -}}</th>
        {{- end }}
      </tr>
    {{- end }}
  </thead>
  <tbody>
    {{- range .TBody }}
      <tr>
        {{- range . }}
          <td{{- with .Alignment }} data-align="{{ . }}"{{- end }}>{{- .Text -}}</td>
        {{- end }}
      </tr>
    {{- end }}
  </tbody>
</table>
