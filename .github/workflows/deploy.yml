name: Deploy exampleSite

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Hugo
        env:
          HUGO_VERSION: "0.157.0"
        run: |
          BASE_URL="https://github.com/gohugoio/hugo/releases/download"
          curl -fsSL \
            "$BASE_URL/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz" \
            -o "hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -fsSL \
            "$BASE_URL/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt" \
            -o hugo_checksums.txt
          grep "hugo_${HUGO_VERSION}_linux-amd64.tar.gz" hugo_checksums.txt | sha256sum --check --status
          tar -xf "hugo_${HUGO_VERSION}_linux-amd64.tar.gz" hugo
          sudo install -m 0755 hugo /usr/local/bin/hugo
          hugo version

      - name: Build
        run: |
          cd exampleSite
          hugo --themesDir ../.. --theme letsblaze --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: exampleSite/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
